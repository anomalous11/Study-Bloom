kind = "web"
previewPath = "/"
title = "StudyBloom"
version = "1.0.0"
id = "artifacts/studybloom"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23362

[services.development]
run = "pnpm --filter @workspace/studybloom run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/studybloom", "run", "build" ]
publicDir = "artifacts/studybloom/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23362"
BASE_PATH = "/"
